name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Run NorCode CI checks
        run: python3 -m norcode ci --check-names --require-selfhost-ready

      - name: Install packaging tools
        run: python3 -m pip install --upgrade build twine

      - name: Build package
        run: pyproject-build

      - name: Check package metadata
        run: python3 -m twine check dist/*

  test-macos:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Run NorCode CI checks
        run: python3 -m norcode ci --check-names --require-selfhost-ready

      - name: Install packaging tools
        run: python3 -m pip install --upgrade build twine

      - name: Build package
        run: pyproject-build

      - name: Check package metadata
        run: python3 -m twine check dist/*

  standalone-binary:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Create virtualenv
        run: python3 -m venv .venv

      - name: Install dev dependencies
        run: .venv/bin/python -m pip install --upgrade pip && .venv/bin/python -m pip install -r requirements-dev.txt

      - name: Build standalone binary
        run: make binary

      - name: Verify standalone binary
        run: dist/norscode test

      - name: Upload standalone binary
        uses: actions/upload-artifact@v4
        with:
          name: norscode-standalone-linux
          path: dist/norscode
