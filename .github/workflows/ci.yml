name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: projects/language
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: projects/language/pyproject.toml

      - name: Install project
        run: python3 -m pip install -e .

      - name: Build native runtime
        run: cargo build
        working-directory: projects/language/runtime

      - name: Run Norscode CI checks
        run: python3 -m norscode ci --check-names --require-selfhost-ready

      - name: Install packaging tools
        run: python3 -m pip install --upgrade build twine

      - name: Build package
        run: pyproject-build

      - name: Check package metadata
        run: python3 -m twine check dist/*

  test-macos:
    runs-on: macos-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: projects/language
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: projects/language/pyproject.toml

      - name: Install project
        run: python3 -m pip install -e .

      - name: Build native runtime
        run: cargo build
        working-directory: projects/language/runtime

      - name: Run Norscode CI checks
        run: python3 -m norscode ci --check-names --require-selfhost-ready

      - name: Install packaging tools
        run: python3 -m pip install --upgrade build twine

      - name: Build package
        run: pyproject-build

      - name: Check package metadata
        run: python3 -m twine check dist/*

  standalone-binary:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: projects/language
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Create virtualenv
        run: python3 -m venv .venv

      - name: Install build dependencies
        run: .venv/bin/python -m pip install --upgrade pip pyinstaller

      - name: Build standalone binary
        run: .venv/bin/python scripts/build-standalone.py

      - name: Verify standalone binary
        run: dist/norscode test

      - name: Upload standalone binary
        uses: actions/upload-artifact@v4
        with:
          name: norscode-standalone-linux
          path: projects/language/dist/norscode

  standalone-binary-macos:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: macos-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: projects/language
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Create virtualenv
        run: python3 -m venv .venv

      - name: Install build dependencies
        run: .venv/bin/python -m pip install --upgrade pip pyinstaller

      - name: Build standalone binary
        run: .venv/bin/python scripts/build-standalone.py

      - name: Verify standalone binary
        run: dist/norscode test

      - name: Upload standalone binary
        uses: actions/upload-artifact@v4
        with:
          name: norscode-standalone-macos
          path: projects/language/dist/norscode

  standalone-binary-windows:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Create virtualenv
        run: cd projects/language && python -m venv .venv

      - name: Install build dependencies
        run: cd projects/language && .\.venv\Scripts\python.exe -m pip install --upgrade pip pyinstaller

      - name: Build standalone binary
        run: cd projects/language && .\.venv\Scripts\python.exe scripts\build-standalone.py

      - name: Verify standalone binary
        run: cd projects/language && .\dist\norscode.exe test

      - name: Upload standalone binary
        uses: actions/upload-artifact@v4
        with:
          name: norscode-standalone-windows
          path: projects/language/dist/norscode.exe
