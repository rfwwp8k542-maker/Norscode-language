name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Build bootstrap binary
        run: bash tools/build-bootstrap-binary.sh

      - name: Run NorCode CI checks
        run: ./bin/nc ci --check-names --require-selfhost-ready

      - name: Install packaging tools
        run: python3 -m pip install --upgrade build twine

      - name: Build package
        run: python3 -m build

      - name: Check package metadata
        run: python3 -m twine check dist/*.whl dist/*.tar.gz

  test-macos:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Build bootstrap binary
        run: bash tools/build-bootstrap-binary.sh

      - name: Run NorCode CI checks
        run: ./bin/nc ci --check-names --require-selfhost-ready

      - name: Install packaging tools
        run: python3 -m pip install --upgrade build twine

      - name: Build package
        run: python3 -m build

      - name: Check package metadata
        run: python3 -m twine check dist/*.whl dist/*.tar.gz

  test-windows:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package
        run: python -m pip install .

      - name: Check CLI entrypoint
        run: norcode --help

      - name: Run Windows smoke check
        run: norcode check tests/test_web_dependency.no
