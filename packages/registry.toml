[packages]
butikk = "./butikk"
std_math = "./std_math"
std_tekst = "./std_tekst"
std_liste = "./std_liste"
std_io = "./std_io"

[registry.packages.eksempel]
path = "./butikk"
description = "Eksempeloppføring for registry-format"

[registry.packages.std_math]
path = "./std_math"
description = "Matematikk-bibliotek (pluss, minus, gange, del, min, maks, absolutt)"

[registry.packages.std_tekst]
path = "./std_tekst"
description = "Tekst-bibliotek (hilsen, rop, formatering)"

[registry.packages.std_liste]
path = "./std_liste"
description = "Listeverktøy for heltall og tekst"

[registry.packages.std_io]
path = "./std_io"
description = "I/O-hjelpere (prompt, skriv_linje, skriv_tall)"

[registry.packages.demo_git]
git = "https://github.com/eksempel/norscode-demo.git"
ref = "v0.1.0"
description = "Eksempel på registry-kilde fra Git"

[registry.packages.demo_url]
url = "https://example.com/norscode/demo-0.1.0.tar.gz"
description = "Eksempel på registry-kilde fra URL"
